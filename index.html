// ===================================================
//  SCORING
// ===================================================
function computeScores(ratings) {
  function dimScore(dim) {
    const stmts = STMTS.filter(s => s.dim === dim);
    const vals  = stmts.map(s => {
      const r = ratings[s.id];
      if (!r) return null;
      return s.rev ? (7 - r) : r;
    }).filter(v => v !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }
  return { avoidance: dimScore('av'), anxiety: dimScore('ax') };
}

function classify(avoidance, anxiety) {
  const MID = 3.5;
  const avHigh = avoidance > MID;
  const axHigh = anxiety   > MID;
  if (!avHigh && !axHigh) return 'Connected';
  if ( axHigh && !avHigh) return 'Alert';
  if ( avHigh && !axHigh) return 'Guarded';
  return avoidance >= anxiety ? 'Guarded' : 'Alert';
}

function rate(v) {

}

function prevStmt() {
  if (CURRENT_STMT > 0) { CURRENT_STMT--; surveyView(); }
}

function nextStmt() {
  if (!RATINGS[STMTS[CURRENT_STMT].id]) return;
  if (CURRENT_STMT < STMTS.length - 1) { CURRENT_STMT++; surveyView(); }
  else { computeAndShowProfile(); }
}

  const { avoidance, anxiety } = computeScores(RATINGS);

}

// ===================================================
//  SCORE-BASED CONTENT SELECTORS
// ===================================================
function dominant(avoidance, anxiety, style) {
  // Returns the score of the defining dimension for this style
  if (style === 'Connected') return Math.max(Math.abs(avoidance - 3.5), Math.abs(anxiety - 3.5));
  if (style === 'Alert')     return anxiety;
  if (style === 'Guarded')   return avoidance;
  return 4;
}

function getStrengths(style, avoidance, anxiety) {
  const p = PROFILES[style];
  const pool = p.strengthsPool;
  const core = pool.slice(0, 3); // first 3 always shown
  let extra;
  if (style === 'Connected') {
    extra = avoidance < 2.8 ? pool[3] : anxiety < 2.8 ? pool[4] : pool[5];
  } else if (style === 'Alert') {
    extra = anxiety > 4.5 ? pool[3] : avoidance < 2.8 ? pool[4] : pool[5];
  } else { // Guarded
    extra = (avoidance > 4.2 && anxiety < 3.5) ? pool[3] : (avoidance > 4.0 && anxiety >= 3.5) ? pool[4] : pool[5];
  }
  return [...core, extra];
}

function getGrowth(style, avoidance, anxiety) {
  const score = dominant(avoidance, anxiety, style);
  return PROFILES[style].growthVariants[score > 4.3 ? 1 : 0];
}

function getBest(style, avoidance, anxiety) {
  const p = PROFILES[style];
  const pool = p.bestPool;
  const core = pool.slice(0, 2); // first 2 always shown
  let extra;
  if (style === 'Connected') {
    extra = anxiety < 2.8 ? pool[3] : avoidance < 2.8 ? pool[2] : pool[4];
  } else if (style === 'Alert') {
    extra = anxiety > 4.5 ? pool[3] : avoidance > 3.5 ? pool[4] : pool[2];
  } else { // Guarded
    extra = anxiety < 3.0 ? pool[3] : avoidance > 4.5 ? pool[4] : pool[2];
  }
  return [...core, extra];
}

function getPressureHeadline(style, avoidance, anxiety) {
  const score = dominant(avoidance, anxiety, style);
  return PROFILES[style].pressure.headlines[score > 4.3 ? 1 : 0];
}

function personalNote(avoidance, anxiety, style) {
  const MID = 3.5;
  const avDist = Math.abs(avoidance - MID);
  const axDist = Math.abs(anxiety   - MID);

  function deg(d) {
    if (d < 0.4) return 'a mild';
    if (d < 1.0) return 'a moderate';
    if (d < 1.8) return 'a strong';
    return 'a very strong';
  }

  if (style === 'Connected') {
    if (avDist < 0.4 && axDist < 0.4) {
      return "Your scores sit close to the midpoint on both dimensions — you don't show a strong pull in either direction. That suggests a flexible, context-sensitive style that adapts well across different team environments, rather than a fixed pattern.";
    }
    if (avDist > axDist) {
      return `You show ${deg(avDist)} pull toward closeness and lean on people relatively easily. Your relational security is particularly grounded in connection — you're at your best when there's genuine collaboration and openness in the team.`;
    }
    return `You show ${deg(axDist)} sense of security in your working relationships. You tend not to overthink how you're landing with others, which makes you a settled, reliable presence — especially when the team is under pressure.`;
  }

  if (style === 'Alert') {
    if (avoidance < MID) {
      return `Your relational sensitivity is ${deg(axDist)} present, and you're also comfortable seeking connection — you tend to reach out rather than pull back when things feel uncertain. The main thing to watch is the monitoring and over-reading of signals, not a reluctance to connect.`;
    }
    return `Your relational sensitivity is ${deg(axDist)} present, and you also show some pull toward working independently. Under pressure this can be an isolating mix — simultaneously watching for signs things are off, while finding it harder to ask for support directly.`;
  }

  if (style === 'Guarded') {
    if (anxiety < MID) {
      return `Your preference for independence is ${deg(avDist)} present, and you're generally settled in your working relationships. Your distance is about self-sufficiency, not worry — colleagues tend to experience you as contained and capable rather than closed off.`;
    }
    return `Your preference for independence is ${deg(avDist)} present, alongside some relational vigilance. This can be a particularly draining combination — reluctant to ask for support while quietly monitoring how things stand with others.`;
  }
}

async function saveResponse() {
  const btn = document.getElementById('save-btn');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  const { avoidance, anxiety, style } = COMPUTED_PROFILE;
  const { error } = await sb.from('att_responses').insert({
    eng_id:      ACTIVE_ENG.id,
    participant: PARTICIPANT_NAME,
    anxiety:     Math.round(anxiety   * 100) / 100,
    avoidance:   Math.round(avoidance * 100) / 100,
    style
  });

  if (error) {
    alert('Could not save. Please try again.\n' + error.message);
    if (btn) { btn.textContent = 'Add my result to the team →'; btn.disabled = false; }
    return;
  }
  profileView(avoidance, anxiety, style, true);
}

          <p class="text-xs text-gray-400 mb-4">Starting points for a team conversation — not prescriptions. Adapt them to the language that fits this group.</p>
          <ul class="space-y-3">
            ${teamAgreements.map((a, i) => `
              <li class="flex gap-3 text-sm text-gray-600">
                <span class="shrink-0 font-semibold mt-0.5" style="color:#d97706">${i + 1}.</span>
                <span class="leading-relaxed">${a}</span>
              </li>
            `).join('')}
          </ul>
        </div>

        <!-- Facilitation questions -->
        <div class="bg-white rounded-2xl p-6 shadow-sm">
          <h3 class="font-semibold text-gray-700 text-sm mb-1">Facilitation questions</h3>
          <p class="text-xs text-gray-400 mb-5">For use in a team session. Not for individual attribution.</p>
          <ol class="space-y-4">
            ${facilitationQs.map((q, i) => `
              <li class="flex gap-3 text-sm text-gray-600">
                <span class="shrink-0 font-semibold text-gray-300 w-5 text-right">${i + 1}.</span>
                <span class="leading-relaxed">${q}</span>
              </li>
            `).join('')}
          </ol>
        </div>

      </div>
    </div>
  `);
}

// ===================================================
//  SCATTER SVG
// ===================================================
function buildScatterSVG(resps, avMean, axMean) {
  const W = 320, H = 260;
  const pL = 42, pR = 16, pT = 18, pB = 32;
  const plotW = W - pL - pR;
  const plotH = H - pT - pB;

  const toX = av => pL + ((av - 1) / 5) * plotW;
  const toY = ax => pT + plotH - ((ax - 1) / 5) * plotH;

  const midX = toX(3.5);
  const midY = toY(3.5);

  const styleCol = { Connected: '#16a34a', Alert: '#d97706', Guarded: '#2563eb' };

  // Deterministic small jitter (use index as seed)
  const dots = resps.map((r, i) => {
    const jx = ((i * 37 + 7) % 11) - 5;
    const jy = ((i * 53 + 13) % 11) - 5;
    return {
      x:   Math.min(W - pR - 6, Math.max(pL + 6, toX(r.avoidance) + jx)),
      y:   Math.min(H - pB - 6, Math.max(pT + 6, toY(r.anxiety)   + jy)),
      col: styleCol[r.style] || '#6b7280'
    };
  });

  // SVG only — legend rendered as HTML below
  const svg = `
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;width:100%">
      <!-- Quadrant backgrounds -->
      <!-- top-left:  low avoidance, high anxiety = Alert   -->
      <rect x="${pL}" y="${pT}" width="${midX - pL}" height="${midY - pT}" fill="#fffbeb" opacity="0.7"/>
      <!-- top-right: high avoidance, high anxiety = Mixed  -->
      <rect x="${midX}" y="${pT}" width="${W - pR - midX}" height="${midY - pT}" fill="#fef2f2" opacity="0.4"/>
      <!-- bottom-left:  low avoidance, low anxiety = Connected -->
      <rect x="${pL}" y="${midY}" width="${midX - pL}" height="${H - pB - midY}" fill="#f0fdf4" opacity="0.7"/>
      <!-- bottom-right: high avoidance, low anxiety = Guarded  -->
      <rect x="${midX}" y="${midY}" width="${W - pR - midX}" height="${H - pB - midY}" fill="#eff6ff" opacity="0.7"/>

      <!-- Border -->
      <rect x="${pL}" y="${pT}" width="${plotW}" height="${plotH}" fill="none" stroke="#e5e7eb" stroke-width="1"/>

      <!-- Midpoint lines -->
      <line x1="${midX}" y1="${pT}" x2="${midX}" y2="${H - pB}" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
      <line x1="${pL}" y1="${midY}" x2="${W - pR}" y2="${midY}" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>

      <!-- Quadrant labels -->
      <text x="${pL + 5}" y="${pT + 13}" font-size="9" fill="#d97706" font-weight="700" font-family="system-ui">Alert</text>
      <text x="${midX + 5}" y="${pT + 13}" font-size="9" fill="#9ca3af" font-weight="600" font-family="system-ui">Mixed</text>
      <text x="${pL + 5}" y="${H - pB - 7}" font-size="9" fill="#16a34a" font-weight="700" font-family="system-ui">Connected</text>
      <text x="${midX + 5}" y="${H - pB - 7}" font-size="9" fill="#2563eb" font-weight="700" font-family="system-ui">Guarded</text>

      <!-- Y-axis label -->
      <text x="11" y="${pT + plotH / 2}" font-size="8" fill="#9ca3af" text-anchor="middle" font-family="system-ui"
        transform="rotate(-90, 11, ${pT + plotH / 2})">← Feels secure · Seeks reassurance →</text>

      <!-- X-axis label -->
      <text x="${pL + plotW / 2}" y="${H - 6}" font-size="8" fill="#9ca3af" text-anchor="middle" font-family="system-ui">
        ← Leans on people · Goes it alone →
      </text>

      <!-- Team mean crosshair -->
      <circle cx="${toX(avMean).toFixed(1)}" cy="${toY(axMean).toFixed(1)}" r="11"
        fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

      <!-- Dots -->
      ${dots.map(d => `
        <circle cx="${d.x.toFixed(1)}" cy="${d.y.toFixed(1)}" r="5.5"
          fill="${d.col}" opacity="0.85" stroke="white" stroke-width="1.5"/>
      `).join('')}
    </svg>
  `;

  // HTML legend below SVG
  const legend = `
    <div style="display:flex;justify-content:center;gap:20px;margin-top:8px">
      ${Object.entries(styleCol).map(([s,c]) => `
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:${c}">
          <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="${c}"/></svg>${s}
        </span>
      `).join('')}
      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280">
        <svg width="22" height="10"><circle cx="11" cy="5" r="9" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,2"/></svg>Team avg
      </span>
    </div>
  `;

  return svg + legend;
}

// ===================================================
//  NARRATIVE GENERATORS
// ===================================================
function generateDynamics(counts, n, avMean, axMean) {
  const sorted  = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const [majStyle, majCount] = sorted[0];
  const majPct  = Math.round((majCount / n) * 100);
  const diverse = sorted.filter(([, v]) => v > 0).length > 1;
  const lines   = [];

  // Opening: composition characterisation
  if (majPct >= 65) {
    lines.push(`This team has a pronounced <strong>${majStyle}</strong> lean — ${majCount} of ${n} people (${majPct}%) show this as their current tendency. That kind of consistency shapes culture in visible ways, and it is worth understanding what that pattern tends to amplify or suppress.`);
  } else if (majPct >= 45) {
    lines.push(`The <strong>${majStyle}</strong> style is the plurality here (${majCount} of ${n}, ${majPct}%), but this is genuinely a mixed team. Different relational styles are represented in meaningful numbers, which creates both richness and the potential for friction if the differences go unnamed.`);
  } else {
    lines.push(`This is a highly diverse team in attachment terms — ${sorted.filter(([,v])=>v>0).map(([s,c])=>`${c} ${s}`).join(', ')}. No single style dominates. That diversity is a potential asset: when it is understood and navigated well, it tends to produce more creative and resilient teams.`);
  }

  // Style-specific dynamics
  if (majStyle === 'Connected' && majPct >= 55) {
    lines.push(`A predominantly Connected team tends to navigate disagreement without too much drama and rebuild trust after setbacks with relative ease. Watch for one subtle risk: psychological safety can occasionally slide into conflict-avoidance, where difficult truths are not spoken because things feel good enough.`);
  }
  if (counts.Alert > 0 && counts.Alert >= counts.Guarded) {
    lines.push(`The Alert presence in this team means relational attunement is high — people are tracking the room and care deeply about how they are coming across. This creates genuine warmth. It also means ambiguity, inconsistency, or silence from leadership tends to land disproportionately hard. Clarity is protective for this team.`);
  }
  if (counts.Guarded > 0 && counts.Guarded >= counts.Alert) {
    lines.push(`The Guarded presence in this team means self-sufficiency is a cultural norm. People are likely capable and professional. The risk is that collaboration stays functional without becoming truly generative — and that struggles go underground until they become serious. Psychological safety needs to be actively built, not assumed.`);
  }

  // Alert/Guarded friction
  if (counts.Alert > 0 && counts.Guarded > 0) {
    lines.push(`Where Alert and Guarded individuals work closely together, a quiet friction can accumulate. Alert-leaning people may read Guarded colleagues as cold or disengaged; Guarded-leaning people may experience Alert colleagues as needy or emotionally unpredictable. Neither reading is accurate — but both feel real. Naming the dynamic is usually the first step to working through it.`);
  }

  // Centre of gravity
  const avLbl = avMean.toFixed(1);
  const axLbl = axMean.toFixed(1);
  if (avMean < 3.5 && axMean < 3.5) {
    lines.push(`The team's overall centre of gravity sits in the Connected quadrant (avoidance: ${avLbl}, anxiety: ${axLbl}), suggesting a reasonable baseline of relational trust. Individual variation around that average still matters — especially for those whose scores sit further from centre.`);
  } else if (axMean > avMean) {
    lines.push(`The team's average anxiety score (${axLbl}) exceeds its avoidance score (${avLbl}), suggesting a collective vigilance around relationships. This team is likely to respond well to regular communication, explicit acknowledgement, and a visible, consistent presence from leadership.`);
  } else {
    lines.push(`The team's average avoidance score (${avLbl}) exceeds its anxiety score (${axLbl}), pointing to a cultural norm of independence and self-containment. Collaboration tends to need explicit structure in this environment — it will not simply happen by virtue of good intentions.`);
  }

  return lines;
}

function generateLeaderImplications(counts, n) {
  const imps = [];
  imps.push("Be explicit about norms for communication and collaboration. Don't assume shared understanding of what 'working well together' looks like.");
  if (counts.Alert > 0) {
    imps.push("Alert-leaning team members read silence as disapproval. Regular, specific, positive feedback matters more than you might expect — and more than a single annual review.");
  }
  if (counts.Guarded > 0) {
    imps.push("Guarded-leaning team members experience autonomy as a signal of trust. Overdoing check-ins, seeking emotional disclosure, or requiring constant visibility tends to backfire.");
  }
  if (counts.Connected > 0) {
    imps.push("Connected team members can absorb relational friction that others struggle with. Avoid over-relying on them as the team's informal emotional stabilisers — that role quietly erodes even resilient people.");
  }
  if (counts.Alert > 0 && counts.Guarded > 0) {
    imps.push("Facilitate at least one explicit conversation about different working and communication styles. The Alert/Guarded dynamic often resolves quickly once it is named in a safe, structured context.");
  }
  imps.push("These are current tendencies, not fixed types. Your role is to create conditions where every style can operate at its best — and where those patterns can shift over time as trust grows.");
  return imps;
}

function generateFacilitationQs(counts, n) {
  const qs = [
    "What do you need from your colleagues to feel genuinely supported — without feeling either smothered or abandoned?",
    "When is it hardest for you to ask for help at work? What tends to get in the way?",
    "How do you signal to your team that you're struggling? Is that signal actually visible to the people around you?",
    "What does psychological safety mean to you in practice, in this team, not in the abstract?",
    "How do you tend to behave when you feel uncertain about where you stand with a colleague or your manager?",
    "What would make it easier to be open about setbacks or self-doubt in this team?",
    "When is this team at its most generative? What relational conditions seem to make that possible — and how do we recreate them?"
  ];
  return qs;
}

// ===================================================
//  WATCH-OUTS GENERATOR
// ===================================================
function generateWatchOuts(counts, n) {
  const watchOuts = [];
  if (counts.Alert > 0 && counts.Guarded > 0) {
    watchOuts.push("Alert and Guarded members reading each other wrong — Alert colleagues interpreting withdrawal as rejection; Guarded colleagues experiencing attentiveness as pressure. This gap widens silently and quickly.");
  }
  if (counts.Alert > 1) {
    watchOuts.push("Collective anxiety amplifying under uncertainty. When several Alert-leaning people are in the same team, unspoken worry can circulate and escalate without anyone naming it. One person's anxiety becomes everyone's.");
  }
  if (counts.Guarded > 1) {
    watchOuts.push("Problems staying underground. In Guarded-heavy teams, struggles tend not to surface until they're serious. The absence of visible tension is not the same as the absence of tension.");
  }
  if (counts.Connected >= Math.ceil(n * 0.5)) {
    watchOuts.push("Conflict-avoidance masquerading as psychological safety. Connected-heavy teams can develop a norm of keeping things smooth that makes genuinely difficult conversations harder to have, not easier.");
  }
  if (counts.Alert > 0) {
    watchOuts.push("Leadership silence being read as displeasure. For Alert-leaning team members, a period without explicit positive signals from leadership will tend to be interpreted negatively. Absence of feedback is not neutral.");
  }
  if (counts.Guarded > 0) {
    watchOuts.push("Guarded team members disengaging quietly when micromanaged or over-included in collaborative work. The signal is not always obvious — look for a drop in initiative or a shift to minimal communication.");
  }
  if (watchOuts.length === 0) {
    watchOuts.push("With a small or uniform team, the main watch-out is blind spots — similar styles tend to reinforce each other's patterns without realising it. Bring in an external perspective periodically.");
  }
  return watchOuts;
}

// ===================================================
//  TEAM AGREEMENTS GENERATOR
// ===================================================
function generateTeamAgreements(counts, n) {
  const agreements = [];
  // Universal
  agreements.push("We name our relational patterns when they're getting in the way — not after the fact, and not in blame.");
  // Alert-relevant
  if (counts.Alert > 0) {
    agreements.push("In difficult conversations, we name the relationship before we raise the issue. 'I'm bringing this because I want us to work well together' comes first.");
  }
  // Guarded-relevant
  if (counts.Guarded > 0) {
    agreements.push("We build in explicit ask moments. No one has to guess when someone needs something — we create space to say it directly.");
  }
  // Mixed Alert/Guarded
  if (counts.Alert > 0 && counts.Guarded > 0) {
    agreements.push("We don't interpret style differences as intent. Someone going quiet is not being difficult. Someone asking lots of questions is not being needy. We check before we conclude.");
  }
  // General collaboration
  agreements.push("We give feedback as close to the moment as possible — not stored up, not diluted, and never weaponised in a group setting.");
  // Connected-heavy — nudge toward honesty
  if (counts.Connected >= Math.ceil(n * 0.5)) {
    agreements.push("We commit to naming the difficult thing even when the atmosphere is comfortable. A good team is one that can have hard conversations, not one that avoids needing to.");
  }
  return agreements;
}
